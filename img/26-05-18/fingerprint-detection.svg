<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="474px" preserveAspectRatio="none" style="width:790px;height:474px;background:#FFFFFF;" version="1.1" viewBox="0 0 790 474" width="790px" zoomAndPan="magnify"><?plantuml 1.2026.4beta2?><defs/><g><g class="legend" data-source-line="1"><rect fill="#DDDDDD" height="433.7188" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="759.376" x="12" y="22"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="399.3008" x="17" y="39.9951">The plugin you are using seems to generated a bad URL.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.8867" x="17" y="56.292">This URL does not look like DEFLATE data.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="367.6641" x="17" y="72.5889">It looks like your plugin is using HUFFMAN encoding.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="88.8857">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="671.7061" x="17" y="105.1826">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="567.6836" x="17" y="121.4795">http://www.plantuml.com/plantuml/png/fZRvb9JAHMef91Wc-GR7gBYQTExMRm...</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="14.0547" x="17" y="137.7764">to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="588.3213" x="17" y="154.0732">http://www.plantuml.com/plantuml/png/~1fZRvb9JAHMef91Wc-GR7gBYQTExMRm...</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="170.3701">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.2773" x="17" y="186.667">It will work this way</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="428.1484" x="17" y="202.9639">You may contact the PlantUML team at plantuml@gmail.com</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="749.376" x="17" y="219.2607">But you should also probably contact the plugin authors you are currently using and send them this image</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="235.5576">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.5449" x="17" y="251.8545">For the record, here is your data:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="268.1514">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="719.2773" x="17" y="284.4482">fZRvb9JAHMef91Wc-GR7gBYQTExMRmaCJi4xWcgeGB905WibQGvaQ2PMFhbdgGxasz8ixOgWF8d04oYb</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="646.0303" x="17" y="300.7451">8kfhzfSu5V149GApnVsfXNq7z_fu-727X2cMJOgol82AtKJKUH-qKyoKpiCCIlI0lbuGZJiFQIR6LgMF</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="711.6689" x="17" y="317.042">leOQgjIQxBfmATbf2MUjp_KdfMmTs3W7e4o7XzlOp0pBlSgUIGemc1DElRrZKNidNuMC4CUH6OM2HnhW</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="674.4678" x="17" y="333.3389">UJ8JBmBoANBXkfUwfPiIgp4CAVkxkCbpQvYx_wTcBVGe55dDw5aJQpfi4Wh0KIi5gti5IHypIMSHRyss</text><text fill="#000000" font-family="sans-serif" 