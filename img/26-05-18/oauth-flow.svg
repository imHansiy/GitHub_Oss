<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="425px" preserveAspectRatio="none" style="width:790px;height:425px;background:#FFFFFF;" version="1.1" viewBox="0 0 790 425" width="790px" zoomAndPan="magnify"><?plantuml 1.2026.4beta2?><defs/><g><g class="legend" data-source-line="1"><rect fill="#DDDDDD" height="384.8281" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="759.376" x="12" y="22"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="399.3008" x="17" y="39.9951">The plugin you are using seems to generated a bad URL.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.8867" x="17" y="56.292">This URL does not look like DEFLATE data.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="367.6641" x="17" y="72.5889">It looks like your plugin is using HUFFMAN encoding.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="88.8857">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="671.7061" x="17" y="105.1826">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="544.2432" x="17" y="121.4795">http://www.plantuml.com/plantuml/png/dVJNaxNBGL7Pr3jNSSG71eipEGlJLw...</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="14.0547" x="17" y="137.7764">to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="564.8809" x="17" y="154.0732">http://www.plantuml.com/plantuml/png/~1dVJNaxNBGL7Pr3jNSSG71eipEGlJLw...</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="170.3701">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.2773" x="17" y="186.667">It will work this way</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="428.1484" x="17" y="202.9639">You may contact the PlantUML team at plantuml@gmail.com</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="749.376" x="17" y="219.2607">But you should also probably contact the plugin authors you are currently using and send them this image</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="235.5576">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.5449" x="17" y="251.8545">For the record, here is your data:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="268.1514">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="688.4678" x="17" y="284.4482">dVJNaxNBGL7Pr3jNSSG71eipEGlJLwEhQgoeZZ19awa3O2F2YsGTRaIpSgKNKD0UajA0IN0cJEZB459x</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="697.0537" x="17" y="300.7451">Zjf_wtmZSmzQOc3M8_XOw2wlMhCysx8BDzqy5YX4lFH0KA_R24v4AbkmW7iPQFF0IgxiQiSTEUJj27Ch</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="691.8379" x="17" y="317.042">4t-EHauAmlGA7vf06Qs9O8wmrwkJqOQCStnbie7NSxAk0ElQkLYJZJS1g1hCqXavDmo-Vl1HoBG7im8_</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="694.5518" x="17" y="333.3389">aEKjvlOzKGchvQrr2SA_76mTicUfCX5QJJBqFW75oD9P1Ms3Kh2Z-OzTFKpVYvzBu2uNYBPuN5q7sGHu</text><text fill="#000000" font-family="sans-serif" 